[duoclock]
# LED on-duration in seconds (720 = 12 minutes)
led_duration = 30

# Serial device: "auto" scans /dev/ttyUSB* for CH340, or set explicit path
serial_device = auto

# Baud rate (must match ESP32 firmware)
baud_rate = 115200

# Log file for button press events
log_file = /var/log/duoclock.log
