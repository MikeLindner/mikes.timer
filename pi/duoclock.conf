# ===========================================================================
# ⚙️ DuoClock Configuration
# ===========================================================================
#
# This file lives at /etc/duoclock.conf on the Pi Zero W.
# It's read by duoclock_monitor.py on startup.
#
# ⚠️ The install script does NOT overwrite this file if it already exists.
# To apply new defaults: delete it and re-run install, or edit manually.
# After editing, restart the service:
#   sudo systemctl restart duoclock-monitor
#
# ===========================================================================

[duoclock]

# ---------------------------------------------------------------------------
# ⏱️ LED on-duration in seconds
# ---------------------------------------------------------------------------
# How long each LED stays on after a button press before auto-off.
# Default: 1800 (30 minutes)
# The timer is per-channel — both LEDs can be active simultaneously.
# Pressing a button that's already active restarts its timer.
# ---------------------------------------------------------------------------
led_duration = 1800

# ---------------------------------------------------------------------------
# 🔌 Serial device path
# ---------------------------------------------------------------------------
# "auto" = scan /dev/ttyUSB* and use the first one found
# Or set an explicit path like: /dev/ttyUSB0
# The ESP32 typically shows up via CH340 or CP2102 USB-serial chip.
# ---------------------------------------------------------------------------
serial_device = auto

# ---------------------------------------------------------------------------
# 📡 Serial baud rate
# ---------------------------------------------------------------------------
# Must match the ESP32 firmware (Serial.begin value in main.cpp).
# Don't change unless you also change the firmware.
# ---------------------------------------------------------------------------
baud_rate = 115200

# ---------------------------------------------------------------------------
# 📝 Event log file path
# ---------------------------------------------------------------------------
# Where button press/timeout events are logged.
# This file is read by the web dashboard (duoclock_web.py).
# Format: "YYYY-MM-DD HH:MM:SS EVENT_NAME" (one per line)
# ---------------------------------------------------------------------------
log_file = /var/log/duoclock.log
