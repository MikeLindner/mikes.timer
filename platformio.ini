; ===========================================================================
; 🛠️ DuoClock PlatformIO Configuration
; ===========================================================================
;
; Two build environments:
;   [esp32dev]  — USB upload via COM8 (development)
;   [ota]       — OTA upload to 10.10.10.235 (field update)
;
; Board: ESP32 DevKit v1 (esp32dev)
; Framework: Arduino
;
; Docs: https://docs.platformio.org/page/projectconf.html
; ===========================================================================

; ---------------------------------------------------------------------------
; 🔌 USB Development Environment
; ---------------------------------------------------------------------------
; Upload and monitor over USB serial on COM8.
; This is the primary development workflow.
; ---------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200

; ---------------------------------------------------------------------------
; 📡 OTA (Over-The-Air) Environment
; ---------------------------------------------------------------------------
; Upload wirelessly to the ESP32 at its static IP.
; Requires the ESP32 to be running firmware with ArduinoOTA or
; ESPHome OTA configured. No monitor_port — use USB env for serial.
; ---------------------------------------------------------------------------
[env:ota]
platform = espressif32
board = esp32dev
framework = arduino
upload_protocol = espota
upload_port = 10.10.10.235
monitor_speed = 115200
