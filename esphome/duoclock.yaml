esphome:
  name: duoclock
  friendly_name: DuoClock Timer

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: "transmission"
  password: "Party.808!"
  manual_ip:
    static_ip: 10.10.10.235
    gateway: 10.10.10.1
    subnet: 255.255.255.0
    dns1: 1.1.1.1
  power_save_mode: LIGHT

logger:
  level: DEBUG

api:

ota:
  platform: esphome

web_server:
  port: 80

globals:
  - id: led_duration
    type: int
    initial_value: '30'

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO13
      mode: INPUT_PULLUP
      inverted: true
    name: "Button Them"
    id: btn_them
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - output.turn_off: led_me_output
        - output.turn_on: led_them_output
        - logger.log: "Button THEM pressed — LED on"
        - delay: !lambda "return id(led_duration) * 1000;"
        - output.turn_off: led_them_output
        - logger.log: "LED THEM timeout"

  - platform: gpio
    pin:
      number: GPIO15
      mode: INPUT_PULLUP
      inverted: true
    name: "Button Me"
    id: btn_me
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - output.turn_off: led_them_output
        - output.turn_on: led_me_output
        - logger.log: "Button ME pressed — LED on"
        - delay: !lambda "return id(led_duration) * 1000;"
        - output.turn_off: led_me_output
        - logger.log: "LED ME timeout"

output:
  - platform: gpio
    pin: GPIO16
    id: led_them_output

  - platform: gpio
    pin: GPIO17
    id: led_me_output

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 10s

  - platform: uptime
    name: "Uptime"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
